apiVersion: v1
kind: ImageStream
metadata:
  name: flask-app
  namespace: flask-test 
spec:
  lookupPolicy:
    local: false
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: flask-app
  namespace: flask-test
spec:
  source:
    type: Git
    git:
      uri: https://github.com/vpatz/flask-test.git  # Replace with your actual repo URL
    contextDir: /
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: flask-app:latest
  triggers:
  - type: ConfigChange
  - type: ImageChange
    imageChange: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flask-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        image: image-registry.openshift-image-registry.svc:5000/flask-test/flask-app:latest
        ports:
        - containerPort: 5000
        env:
        - name: FLASK_APP
          value: app.py
        - name: FLASK_RUN_HOST
          value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app
  namespace: flask-test
spec:
  selector:
    app: flask-app
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: flask-app
  namespace: flask-test
spec:
  to:
    kind: Service
    name: flask-app
  port:
    targetPort: 5000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect